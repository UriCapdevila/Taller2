[build]
  base = "."
  publish = "dist"
  functions = "netlify/functions"

# Local development: `netlify dev` starts both Vite and the Functions runtime.
# Vite runs on port 5173; netlify dev proxies everything on port 8888.
# The /.netlify/functions/* routes are served automatically.
[dev]
  command = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false
